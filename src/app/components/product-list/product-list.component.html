<div class="product-list-container">
  <h2>Nossos Produtos</h2>

  @if(false) {
  <div class="loading-message">Carregando produtos...</div>
  } @if(false) {
  <div class="error-message">
    Erro ao carregar produtos. Por favor, tente novamente mais tarde.
    <button (click)="loadProducts()" class="retry-button">
      Tentar novamente
    </button>
  </div>
  }

  <div class="product-grid">
    <div class="product-card">
      <img
        [src]="'https://fjallraven.vtexassets.com/arquivos/ids/173659-600-0/0304270301F24210-F550_1.png.png?v=638754886327100000'"
        class="product-image"
      />
      <div class="product-info">
        <h3 class="product-title">
          {{ "Fjallraven - Foldsack No. 1 Backpack, Fits 15 Laptops" }}
        </h3>
        <p class="product-price">R$ {{ 109.95 }}</p>
        <button class="add-to-cart-button">
          <i class="fas fa-cart-plus"></i> Adicionar ao Carrinho
        </button>
      </div>
    </div>
    <div class="product-card">
      <img
        [src]="'https://fjallraven.vtexassets.com/arquivos/ids/173659-600-0/0304270301F24210-F550_1.png.png?v=638754886327100000'"
        class="product-image"
      />
      <div class="product-info">
        <h3 class="product-title">
          {{ "Fjallraven - Foldsack No. 1 Backpack, Fits 15 Laptops" }}
        </h3>
        <p class="product-price">R$ {{ 109.95 }}</p>
        <button class="add-to-cart-button">
          <i class="fas fa-cart-plus"></i> Adicionar ao Carrinho
        </button>
      </div>
    </div>
  </div>
</div>
